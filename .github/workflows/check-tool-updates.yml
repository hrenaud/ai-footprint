name: Check tool updates

on:
  schedule:
    - cron: "0 7 * * 1" # chaque lundi 07:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Vérifie les nouvelles versions ecologits / huggingface_hub
        env:
          GH_TOKEN: ${{ github.token }}
        run: python -m ai_footprint.tool_updates
