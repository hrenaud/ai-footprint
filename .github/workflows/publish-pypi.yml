name: publish-pypi

# Publie ai-footprint sur PyPI à chaque tag de release (créé par
# `release bump`). Authentification par Trusted Publishing (OIDC) : aucune
# clé stockée — le projet PyPI doit déclarer ce repo + ce workflow comme
# éditeur de confiance (pypi.org → project → Publishing).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: # re-publication manuelle d'un tag déjà poussé

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # requis par le Trusted Publishing OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
