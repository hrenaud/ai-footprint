site_name: AI Footprint — Documentation
site_url: https://hrenaud.github.io/ai-footprint/guide/
repo_url: https://github.com/hrenaud/ai-footprint
docs_dir: docs
site_dir: .mkdocs-build
use_directory_urls: false

exclude_docs: |
  index.html
  fr/
  assets/logo-claude.svg
  assets/logo-opencode.png
  assets/logo-pi.svg
  assets/report-en.png
  assets/report-fr.png
  assets/script.js
  assets/statusline.png
  assets/style.css
  guide/

theme:
  name: material
  language: fr
  favicon: assets/favicon.svg
  features:
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: fr
          default: true
          name: Français
        - locale: en
          name: English
          nav_translations:
            Accueil: Home
            Guide utilisateur: User guide
            Guide avancé: Advanced guide
            Méthodologie: Methodology
            Comparaison des outils: Tool comparison
            Publication PyPI: PyPI Publication
            Checklist nouvel outil: New tool checklist
            Contribuer: Contributing

nav:
  - Accueil: index.md
  - Guide utilisateur: GUIDE.md
  - Guide avancé: GUIDE-AVANCE.md
  - Méthodologie: METHODOLOGY.md
  - Comparaison des outils: comparaison-donnees-outils.md
  - Publication PyPI: publication-pypi.md
  - Checklist nouvel outil: checklist-nouvel-outil.md
  - Contribuer: CONTRIBUTING.md
